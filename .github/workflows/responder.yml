name: Responder

on:
  schedule:
    - cron: '*/5 12-22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: shared-state
  cancel-in-progress: false

jobs:
  respond:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run responder
        env:
          ALPACA_API_KEY:       ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:    ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:      ${{ secrets.ALPACA_BASE_URL }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m bot.responder

      - name: Commit state
        run: |
          git config user.name  "trading-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.db || true
          if ! git diff --cached --quiet; then
            git commit -m "responder state $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git pull --rebase --autostash || true
            git push || echo "Push race; next run will catch up."
          else
            echo "No state changes."
          fi
